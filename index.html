<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeira aula JS</title>
</head>
<body id="corpo">
    <h1 id="fonte1">Hello World</h1>
    <p id="fonte2">Esse é o meu primeiro código em JavaScript</p>

    <h2>Aperte o botão para trocar a cor de fundo da tela</h2>
    <button onclick="mudarCor()">Trocar cor</button>

    <button onclick="mudar()">Clique aqui</button>
    <script>
        function mudarCor() {
            let cores = ["#FF5733", "#3357FF", "#33FF57", "#FF33A1"];

            let corAleatoria = cores[Math.floor(Math.random() * cores.length)]

            document.body.style.backgroundColor = corAleatoria;
     
        }

        function mudar() {
            const preto = "#000000";
            const branco = "#FFFFFF";
            const verde = "#00FF00";

            document.getElementById("corpo").style.backgroundColor = preto;
            document.getElementById("fonte1").style.color = branco;

            let fonte2 = document.getElementById("fonte2");
            fonte2.style.backgroundColor = verde;
            fonte2.style.color = preto;
        }
    </script>
</body>
</html>
